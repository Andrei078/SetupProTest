<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/assets/logo2.png">
  <title>SetupProTest</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

</head>

<body>

<div class="sidebar">

  <div class="logo"> 
   <img src="../assets/logo.png" alt="Logo" class="logo">
  </div>

  <div class="menu">

    <div class="menu-item" onclick="loadPage('keyboard.html')">
      <i class="fas fa-keyboard"></i>
      <span>Tastatură</span>
    </div>

    <div class="menu-item" onclick="loadPage('webcam.html')">
      <i class="fas fa-video"></i>
      <span>Webcam</span>
    </div>

    <div class="menu-item" onclick="loadPage('mouse.html')">
      <i class="fas fa-mouse"></i>
      <span>Mouse</span>
    </div>

    <div class="menu-item" onclick="loadPage('audio.html')">
      <i class="fas fa-headphones"></i>
      <span>Căști</span>
    </div>

    <div class="menu-item" onclick="loadPage('controller.html')">
      <i class="fas fa-gamepad"></i>
      <span>Controller</span>
    </div>
  </div>

  <div class="settings" onclick="loadPage('settings.html')">
    <i class="fas fa-cog"></i>
    <span>Setări</span>
  </div>

</div>

<div class="content" id="content">
  <h1>Bine ai venit în SetupProTest</h1>
  <p>Alege un modul din meniul din stânga</p>
</div>

<script src="app.js"></script>
</body>
</html>
